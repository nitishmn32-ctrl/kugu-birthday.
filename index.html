<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Kugu ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: url('photo.jpg');
    background-size: cover;
    background-position: center;
    color: white;
    overflow: hidden;
}

/* Dark overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* Login */
#login {
    position: relative;
    margin-top: 40%;
}

input {
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: red;
    color: white;
    border: none;
    border-radius: 8px;
}

/* Main */
#main {
    display: none;
    position: relative;
    top: 20%;
}

h1 {
    font-size: 35px;
}

/* Cake */
.cake {
    font-size: 80px;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-20px); }
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity:1;}
    100% { transform: translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- PASSWORD -->
<div id="login">
    <h2>Only for Kugu 😘 💖</h2>
    <input type="password" id="pass" placeholder="Enter Secret Love Code">
    <br>
    <button onclick="checkPass()">Unlock 🔓</button>
</div>

<!-- MAIN -->
<div id="main">
    <h1>Happy Birthday My Kugu 😘💖</h1>
    <div class="cake">🎂</div>
    <p id="text"></p>
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
// PASSWORD
function checkPass() {
    let p = document.getElementById("pass").value;

    if(p === "Ardhangini") {
        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "block";
        startTyping();
        document.getElementById("music").play();
    } else {
        alert("Sirf meri Kugu hi open kar sakti hai 😘");
    }
}

// MESSAGE
let message = "Meri pyari Kugu 😘💖\n\nAaj ka din mere liye sabse special hai, kyunki aaj tum iss duniya me aayi thi 💕\n\nTum meri life ki wo khushi ho jo kabhi kam nahi hoti 😊\n\nJab bhi main udaas hota hu, tumhari yaad hi meri smile ban jaati hai 💖\n\nMain bas itna chahta hu ki tum hamesha khush raho, safe raho, aur meri hi raho 😘\n\nTum sirf meri girlfriend nahi ho... tum meri duniya ho, meri aadat ho, meri jaan ho 💞\n\nI Love You So Much Kugu ❤️\n\nHappy Birthday once again meri Ardhangini 💖";

// Typing
let i = 0;
function startTyping() {
    let speed = 40;
    function type() {
        if (i < message.length) {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

// Hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
  </html>
